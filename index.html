<!DOCTYPE html>
<html>
<head>
  <title>SIM_PRO_DICKY</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; }

    #header{
      position:absolute;
      z-index:999;
      width:100%;
      background:#0b1f14;
      color:white;
      text-align:center;
      padding:10px;
      font-weight:bold;
    }

    #logo{
      display:inline-block;
      width:30px;
      height:30px;
      border-radius:50%;
      background:#1f6f3f;
      line-height:30px;
      margin-right:8px;
      font-weight:bold;
    }

    #map{
      height:100vh;
      width:100%;
    }
  </style>
</head>

<body>

<div id="header">
  <span id="logo">DC</span>
  SIM_PRO_DICKY | WEBGIS PERKEBUNAN SAWIT
</div>

<div id="map"></div>

<script>

// =====================
// MAP BASE
// =====================
var map = L.map('map').setView([0.6500, 101.9024], 15);

// SATELLITE LAYER
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Satellite'
}).addTo(map);

// =====================
// FUNCTION BLOK SAWIT
// =====================
function addBlock(name, coords, color){

  var poly = L.polygon(coords, {
    color: "white",
    weight: 2,
    fillColor: color,
    fillOpacity: 0.6
  }).addTo(map);

  poly.on("click", function(){
    this.bindPopup("<b>🌴 " + name + "</b>").openPopup();
  });

}

// =====================
// 15 BLOK SAWIT (FIXED)
// =====================

// BARIS 1
addBlock("B1", [[0.6512,101.8998],[0.6513,101.9004],[0.6509,101.9005],[0.6508,101.8999]], "green");
